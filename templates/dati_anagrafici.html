{% extends "base.html" %}

{% block title %}Dati Anagrafici{% endblock %}
{% block header %}Inserisci i tuoi dati{% endblock %}

{% block extra_css %}
<style>
.info-box {
    background: #fff3cd; border: 1px solid #ffc107;
    border-radius: 10px; padding: 14px 18px; margin-bottom: 24px;
    color: #856404; font-size: .92rem;
}
.form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
.form-grid .full-width { grid-column: 1 / -1; }
.form-group label {
    display: block; font-weight: 600; margin-bottom: 6px;
    color: #444; font-size: .9rem;
}
.form-group input {
    width: 100%; padding: 10px 12px; border: 2px solid #e0e0e0;
    border-radius: 8px; font-size: .95rem; font-family: inherit;
    transition: border-color .2s; box-sizing: border-box;
}
.form-group input:focus {
    outline: none; border-color: #667eea;
}
.required-star { color: #dc3545; margin-left: 2px; }
.actions { display: flex; justify-content: center; margin-top: 24px; }
</style>
{% endblock %}

{% block content %}
<div class="info-box">
    ⚠️ Non ho trovato i tuoi dati in anagrafe. Inserisci le informazioni manualmente per procedere.
</div>

<form method="POST" action="{{ url_for('dati_anagrafici_post') }}">
    <div class="form-grid">
        <div class="form-group">
            <label for="nome">Nome <span class="required-star">*</span></label>
            <input type="text" id="nome" name="nome" value="{{ nome_pre }}" required autocomplete="given-name">
        </div>
        <div class="form-group">
            <label for="cognome">Cognome <span class="required-star">*</span></label>
            <input type="text" id="cognome" name="cognome" value="{{ cognome_pre }}" required autocomplete="family-name">
        </div>
        <div class="form-group">
            <label for="data_nascita">Data di nascita <span class="required-star">*</span></label>
            <input type="date" id="data_nascita" name="data_nascita" required>
        </div>
        <div class="form-group">
            <label for="codice_fiscale">Codice fiscale <span class="required-star">*</span></label>
            <input type="text" id="codice_fiscale" name="codice_fiscale" required
                   maxlength="16" style="text-transform:uppercase" autocomplete="off">
        </div>
        <div class="form-group">
            <label for="luogo_nascita">Comune di nascita <span class="required-star">*</span></label>
            <input type="text" id="luogo_nascita" name="luogo_nascita" required>
        </div>
        <div class="form-group">
            <label for="provincia_nascita">Provincia di nascita (sigla) <span class="required-star">*</span></label>
            <input type="text" id="provincia_nascita" name="provincia_nascita" required
                   maxlength="2" style="text-transform:uppercase" placeholder="es. RM">
        </div>
        <div class="form-group full-width">
            <label for="indirizzo">Indirizzo di residenza</label>
            <input type="text" id="indirizzo" name="indirizzo" autocomplete="street-address">
        </div>
        <div class="form-group">
            <label for="comune_residenza">Comune di residenza</label>
            <input type="text" id="comune_residenza" name="comune_residenza">
        </div>
        <div class="form-group">
            <label for="cap">CAP</label>
            <input type="text" id="cap" name="cap" maxlength="5">
        </div>
    </div>

    <div class="actions">
        <button type="submit" class="btn btn-primary">Continua</button>
    </div>
</form>
{% endblock %}
